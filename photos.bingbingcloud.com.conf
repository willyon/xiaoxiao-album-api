server {
    #nginx在ipv4的80端口监听http请求
    #nginx在ipv6的80端口监听http请求
    #只处理请求头中Host等于8.134.118.242的请求
    server_name photos.bingbingcloud.com;  # 没有域名的时候就 先用 _ 或公网IP

    # 静态站点根目录：指向 frontend 告诉nginx 当要给前端请求返回文件时 应该到哪个目录去拿
    root /var/www/photos.bingbingcloud.com/frontend;
    index index.html;

    # 先放 /localStorage/，并加 ^~ 提高优先级，禁止正则再参与
    location ^~ /localStorage/ {
        alias /var/www/photos.bingbingcloud.com/backend/localStorage/;  # 绝对路径，且末尾有 /
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 基本静态文件缓存（可选）public表示允许浏览器和代理服务器(cdn 反向代理等)缓存这个资源 immutable就是告诉浏览器，在缓存有效期内，这个文件不会变
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|avif|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # HTML 不缓存（确保拿最新）
    location = /index.html {
        add_header Cache-Control "no-cache";
        expires -1;
        try_files $uri =404;
    }

    # 后端 API 反向代理（Node 服务监听 3000）
    # 整站反代给 Node（注意：proxy_pass 不带路径，URI 原样转发）
    # 如果请求对应的静态文件(如css、js、图片等资源)存在 则返回文件 否则一律返回index.html
    location / {
        # SPA 前端：如果命中真实文件就返回，否则回退到 index.html
        try_files $uri $uri/ /index.html;
    }

    # 认证相关API代理 
    #用户相关(/auth/*)
    location /auth/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 图片相关API代理 (/images/*)
    location /images/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # 文件上传大小限制
        client_max_body_size 100M;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    #阿里云回调(/aliyunOss/*)
    location /aliyunOss/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/photos.bingbingcloud.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/photos.bingbingcloud.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    #用户访问http时 强制转https
    if ($host = photos.bingbingcloud.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name photos.bingbingcloud.com;
    return 404; # managed by Certbot


}
